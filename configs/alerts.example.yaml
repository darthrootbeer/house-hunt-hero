version: 1
email:
  enabled: true
  from: "alerts@example.com"
  to:
    - "you@example.com"
  smtp_host: "smtp.example.com"
  smtp_port: 587
  use_tls: true
  username_env: "SMTP_USERNAME"
  password_env: "SMTP_PASSWORD"

pushover:
  enabled: true
  user_key_env: "PUSHOVER_USER_KEY"
  api_token_env: "PUSHOVER_API_TOKEN"
  priority: 0
