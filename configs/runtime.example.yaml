version: 1
schedule:
  cadence_minutes: 10
  max_runtime_minutes: 8

alerting:
  require_status:
    - "off_market"
    - "pre_zillow"

scoring:
  minimum_confidence: 0.72

storage:
  type: "sqlite"
  path: "state/state.db"
  cache_ttl_days: 7

dedupe:
  suppress_alert_days: 7
  fuzzy_match_threshold: 0.88

ai:
  provider: "openai"
  model: "gpt-4o-mini"
  timeout_seconds: 12
  fail_open: true
