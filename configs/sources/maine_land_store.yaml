source_id: "maine_land_store"
label: "The Maine Land Store"
enabled: true
method: "playwright"
base_url: "https://www.mainelandstore.com"
search_url: "https://www.mainelandstore.com/properties"

scraping:
  listing_container_selector: ".property-card"
  listing_url_selector: "a[href*='/property'], a[href*='/listing']"
  wait_timeout_ms: 12000

rate_limit_seconds: 60

notes: |
  - Maine-specific land listings
  - May include properties with structures
  - Local/regional focus
