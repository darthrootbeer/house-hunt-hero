source_id: "kw_land"
label: "KW Land (Keller Williams)"
enabled: true
method: "playwright"
base_url: "https://www.kwland.com"
search_url: "https://www.kwland.com/search?state=ME"

scraping:
  listing_container_selector: ".property-card"
  listing_url_selector: "a[href*='/property/'], a[href*='/listing/']"
  wait_timeout_ms: 15000

property_filters:
  exclude_terms: ['vacant']

rate_limit_seconds: 60

notes: |
  - Keller Williams land division
  - National coverage with Maine properties
  - Filter for properties with structures
