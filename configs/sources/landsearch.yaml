source_id: "landsearch"
label: "LandSearch - Land with Structures"
enabled: true
method: "playwright"
base_url: "https://www.landsearch.com"
search_url: "https://www.landsearch.com/properties/maine"

scraping:
  listing_container_selector: ".property-card, [class*='PropertyCard']"
  listing_url_selector: "a[href*='/property/']"
  wait_timeout_ms: 15000

property_filters:
  exclude_terms: ['raw land', 'vacant land', 'undeveloped']

rate_limit_seconds: 60

notes: |
  - Land listings platform
  - Focus on properties with structures, not raw land
  - Filter out vacant/undeveloped parcels
