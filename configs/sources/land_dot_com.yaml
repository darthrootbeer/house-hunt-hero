source_id: "land_dot_com"
label: "Land.com"
enabled: false  # CDN protection - requires enhanced stealth
method: "playwright"
base_url: "https://www.land.com"
search_url: "https://www.land.com/Maine"

scraping:
  listing_container_selector: ".property-card, [data-testid*='property']"
  listing_url_selector: "a[href*='/property/']"
  wait_timeout_ms: 15000

property_filters:
  exclude_terms: ['vacant', 'raw land']

rate_limit_seconds: 90

notes: |
  - Large land marketplace
  - DISABLED: Site has CDN protection (Access Denied)
  - Requires enhanced anti-bot measures
  - Focus on properties with structures when enabled
