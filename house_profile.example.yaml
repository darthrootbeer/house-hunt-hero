version: 1
profile_name: "Early Market Buyer"

hard_constraints:
  price_max: 950000
  regions:
    - name: "North Bay"
      include:
        - "San Rafael, CA"
        - "Novato, CA"
      exclude:
        - "Downtown San Rafael, CA"
  bedrooms_min: 3
  bathrooms_min: 2
  property_types:
    - "single_family"
    - "townhome"

soft_preferences:
  weights:
    walkability: 0.25
    quiet_street: 0.20
    large_lot: 0.20
    natural_light: 0.15
    move_in_ready: 0.20
  notes:
    walkability:
      keywords:
        - "walk to"
        - "near shops"
        - "close to town"
    large_lot:
      min_lot_sqft: 7000
    natural_light:
      keywords:
        - "sunny"
        - "bright"
        - "south-facing"

negative_filters:
  must_not_have:
    keywords:
      - "tenant occupied"
      - "cash only"
      - "auction"
      - "as-is"
    property_types:
      - "condo"
  max_hoa_monthly: 250

vibe:
  description: "Warm, bright, calm, modern-cozy. Avoid heavy remodels."
  extra_keywords:
    include:
      - "updated kitchen"
      - "hardwood"
      - "backyard"
    exclude:
      - "fixer"
      - "fire damage"

scoring:
  minimum_confidence: 0.72
  ai_boost_enabled: true
  ai_boost_weight: 0.15
  rule_boost_weight: 0.85

alerting:
  require_status:
    - "off_market"
    - "pre_zillow"
  max_age_minutes: 180
