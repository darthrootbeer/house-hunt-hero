name: Daily Market Update

on:
  schedule:
    # 7:00 AM Eastern (12:00 UTC) every day
    - cron: '0 12 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run market updater
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python update_market_data.py

      - name: Commit updated report
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_report/ backup_cities.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily market data update $(date +'%Y-%m-%d')"
            git push
          fi
